# Build and push the lab image to GHCR when a Git tag is pushed.
# Tags pushed: "latest" and the same name as the Git tag (e.g. v1.0.0).

name: Publish image to GHCR

on:
  push:
    tags:
      - "*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build test image
        run: docker build -f docker/Dockerfile --target tests -t k3slab-tests .

      - name: Run tests
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
        run: |
          mkdir -p reports
          docker run --rm --privileged -p 80:80 \
            -e K3SLAB_TEST_REPORT_DIR=/reports \
            -e GITHUB_ACTIONS=true \
            -e GITHUB_STEP_SUMMARY \
            -v "${{ github.workspace }}/reports:/reports" \
            k3slab-tests

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: reports/
          if-no-files-found: ignore

  build-push:
    needs: [tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Image name (GHCR must be lowercase)
        run: |
          echo "IMAGE=${REGISTRY}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
