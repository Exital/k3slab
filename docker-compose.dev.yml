services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev-runtime
    container_name: k3slab-dev-backend
    privileged: true
    cgroup: host
    environment:
      LABS_ROOT: /workspace/lab
      LAB_ID: 01-kubectl-basics
      K3SLAB_LISTEN: 0.0.0.0:3010
      K3SLAB_STATIC_DIR: /workspace/app/backend/dist
      K3SLAB_K3S_SNAPSHOTTER: native
    ports:
      - "3010:3010"
      - "80:80"
    volumes:
      - ./:/workspace
      - k3slab-dev-k3s-data:/var/lib/rancher/k3s
      - k3slab-dev-kube:/etc/rancher/k3s
      - k3slab-dev-run:/run/k3slab
      - k3slab-dev-go-build:/root/.cache/go-build
      - k3slab-dev-go-mod:/go/pkg/mod

  frontend:
    image: node:22-bookworm
    container_name: k3slab-dev-frontend
    working_dir: /workspace/app/frontend
    environment:
      VITE_PROXY_TARGET: http://backend:3010
      CHOKIDAR_USEPOLLING: "true"
    command: >
      bash -lc "npm install --no-audit --no-fund &&
                npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./:/workspace
    depends_on:
      - backend

volumes:
  k3slab-dev-k3s-data:
  k3slab-dev-kube:
  k3slab-dev-run:
  k3slab-dev-go-build:
  k3slab-dev-go-mod:
