# Demo app exposed via K3s Traefik (HTTP :80 on the host when published).
# Build:  docker build -f docker/Dockerfile -t k3slab:test .
# Run:    docker run --rm --name k3slab --privileged --cgroupns=host \
#           -p 3010:3010 -p 80:80 -p 443:443 \
#           -e K3SLAB_PUBLIC_ORIGIN=http://127.0.0.1 k3slab:test
# Apply:  kubectl apply -f manifests/demo-ingress.yml
# Open:   http://localhost/my_app/  (tab in the terminal header)
---
apiVersion: v1
kind: Namespace
metadata:
  name: demo-ingress
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-nginx
  namespace: demo-ingress
data:
  default.conf: |
    server {
      listen 80;
      location /my_app/ {
        alias /usr/share/nginx/html/;
        index index.html;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: demo-ingress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-conf
          configMap:
            name: web-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: demo-ingress
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  namespace: demo-ingress
spec:
  ingressClassName: traefik
  rules:
    - host: localhost
      http:
        paths:
          - path: /my_app
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
