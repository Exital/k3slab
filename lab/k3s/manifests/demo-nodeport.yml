# Demo app exposed via NodePort 30010 (publish with docker run -p 30010:30010).
# Build:  docker build -f docker/Dockerfile -t k3slab:test .
# Run:    docker run ... -p 3010:3010 -p 30010:30010 \
#           -e K3SLAB_PUBLIC_ORIGIN=http://127.0.0.1 k3slab:test
# Apply:  kubectl apply -f manifests/demo-nodeport.yml
# Open:   http://127.0.0.1:30010/  (tab in the terminal header)
---
apiVersion: v1
kind: Namespace
metadata:
  name: demo-nodeport
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: demo-nodeport
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: demo-nodeport
spec:
  type: NodePort
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30010
