name: Kubernetes Basics

tabs:
  steps:
    - id: create-namespace
      type: task
      title: Create broken environment
      run: bash scripts/setup.sh

    - id: question-1
      type: question
      title: Find the failing namespace
      description: |
        Use `kubectl` to find the pod that is in **CrashLoopBackOff**.  
        Submit the **namespace name** where that pod runs.
      answer_type: text
      setup:
        - kubectl apply -f manifests/broken-app.yml
      correct_message: |
        Correct — the failing pod is in the **`broken-demo`** namespace. You can inspect it with
        `kubectl get pods -n broken-demo` or `kubectl describe pod -n broken-demo`.
      verify: |
        test "$ANSWER" = "broken-demo"
      hints:
        - "Try `kubectl get pods -A`"
        - "Read the NAMESPACE column for the row whose STATUS contains CrashLoopBackOff"

    - id: question-2
      type: question
      title: Which command lists services?
      answer_type: single_choice
      options:
        - kubectl get pods
        - kubectl get svc
        - helm install
      incorrect_message: |
        Not this one. **Services** live in the `Service` API — think about which
        `kubectl get` subcommand lists them (it is not `pods` or `helm install`).
      correct_message: |
        Right — **`kubectl get svc`** lists **Service** objects in the cluster (short name `svc`).
      verify: |
        test "$ANSWER" = "kubectl get svc"
      hints:
        - "Services are a core Kubernetes API resource"

  markdowns:
    - id: cheat-sheet
      title: Cheat sheet
      icon: description
      content: |
        ## Useful commands

        - List pods in all namespaces: `kubectl get pods -A`
        - Describe a pod: `kubectl describe pod <name> -n <namespace>`
        - List services: `kubectl get svc -A`

    - id: lab-info
      title: Lab info
      icon: info
      content: |
        This lab runs **K3s** inside the container. Use the web terminal with `kubectl` against the local cluster.

        Workshop files live under **`LAB_ROOT`** (the mounted lab directory containing `workshop.yml`).
