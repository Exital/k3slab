name: Kubernetes Basics

steps:
  - id: create-namespace
    type: task
    title: Create broken environment
    run: bash scripts/setup.sh

  - id: question-1
    type: question
    title: Find the failing namespace
    description: |
      Use `kubectl` to find the pod that is in **CrashLoopBackOff**.  
      Submit the **namespace name** where that pod runs.
    answer_type: text
    setup:
      - kubectl apply -f manifests/broken-app.yml
    verify: |
      kubectl get pods -A | grep -q CrashLoopBackOff && test "$ANSWER" = "broken-demo"
    hints:
      - "Try `kubectl get pods -A`"
      - "Read the NAMESPACE column for the row whose STATUS contains CrashLoopBackOff"

  - id: question-2
    type: question
    title: Which command lists services?
    answer_type: single_choice
    options:
      - kubectl get pods
      - kubectl get svc
      - helm install
    incorrect_message: |
      Not this one. **Services** live in the `Service` API — think about which
      `kubectl get` subcommand lists them (it is not `pods` or `helm install`).
    verify: |
      test "$ANSWER" = "kubectl get svc"
    hints:
      - "Services are a core Kubernetes API resource"
