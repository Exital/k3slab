apiVersion: v1
kind: Namespace
metadata:
  name: kubectl-basics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: kubectl-basics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: web-svc
  namespace: kubectl-basics
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logger
  namespace: kubectl-basics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logger
  template:
    metadata:
      labels:
        app: logger
    spec:
      containers:
        - name: logger
          image: busybox:1.36
          command:
            - sh
            - -c
            - while true; do echo k3slab-log-ok; sleep 30; done
