name: Deployment Basics
description: Troubleshoot the simple-ctf Deployment, Service, and Ingress, then capture the flag at /ctf.

tabs:
  steps:
    - id: deploy-lab-stack
      type: task
      title: Deploy the CTF lab
      run: bash scripts/setup.sh

    - id: question-image-tag
      type: question
      title: Fix the container image tag
      description: |
        The Deployment cannot pull the application image.
        Inspect events or the Deployment spec, fix the image to use the correct tag, and submit the **tag name only** (the part after `:`).
      answer_type: text
      correct_message: |
        Correct — the image should be **`ghcr.io/exital/simple-ctf:latest`**.
      verify: |
        img=$(kubectl get deploy simple-ctf -n deployment-basics -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null)
        echo "$img" | grep -q ':latest$'
        test "$ANSWER" = "latest"
      hints:
        - "`kubectl describe deploy simple-ctf -n deployment-basics`"
        - "The registry path is `ghcr.io/exital/simple-ctf` — only the tag is wrong"

    - id: question-env-name
      type: question
      title: Environment variable from logs
      description: |
        After the image pulls, pods may still crash. Read **pod logs** from the lab entrypoint script.
        Which **environment variable name** must be set? Submit the variable name only.
      answer_type: text
      correct_message: |
        Right — the wrapper requires **`CTF_RELAY_MODE`**.
      verify: |
        test "$ANSWER" = "CTF_RELAY_MODE"
      hints:
        - "`kubectl get pods -n deployment-basics`"
        - "`kubectl logs -n deployment-basics -l app=simple-ctf --tail=50`"

    - id: question-env-value
      type: question
      title: Required value for CTF_RELAY_MODE
      description: |
        Set the variable on the Deployment container (e.g. `kubectl edit deploy` or `kubectl set env`).
        Submit the **exact value** the logs say is required.
      answer_type: text
      correct_message: |
        Correct — set **`CTF_RELAY_MODE=active`**. The app entrypoint can then generate a FLAG and start the server.
      verify: |
        val=$(kubectl get deploy simple-ctf -n deployment-basics -o jsonpath='{.spec.template.spec.containers[0].env[?(@.name=="CTF_RELAY_MODE")].value}' 2>/dev/null)
        test "$val" = "active"
        test "$ANSWER" = "active"
      hints:
        - "`kubectl set env deploy/simple-ctf -n deployment-basics CTF_RELAY_MODE=active`"
        - "Wait for the pod to become Running before continuing"

    - id: question-service-selector
      type: question
      title: Service selector label
      description: |
        The **Service** must route traffic to the Deployment pods. Check `kubectl get svc,endpoints -n deployment-basics`.
        Submit the **label value** the Service selector should use (the `app` label on pods).
      answer_type: text
      correct_message: |
        Correct — the selector should match **`app=simple-ctf`**.
      verify: |
        sel=$(kubectl get svc simple-ctf-svc -n deployment-basics -o jsonpath='{.spec.selector.app}' 2>/dev/null)
        test "$sel" = "simple-ctf"
        test "$ANSWER" = "simple-ctf"
      hints:
        - "`kubectl get deploy simple-ctf -n deployment-basics --show-labels`"
        - "`kubectl edit svc simple-ctf-svc -n deployment-basics`"

    - id: question-ingress-backend
      type: question
      title: Ingress backend service name
      description: |
        The **Ingress** must point at the correct **Service** name (port 3000). The `/ctf` path and Traefik strip-prefix middleware are already configured.
        Fix the Ingress backend and submit the **Service name**.
      answer_type: text
      correct_message: |
        Correct — the Ingress backend service is **`simple-ctf-svc`**.
      verify: |
        svc=$(kubectl get ingress simple-ctf-ingress -n deployment-basics -o jsonpath='{.spec.rules[0].http.paths[0].backend.service.name}' 2>/dev/null)
        test "$svc" = "simple-ctf-svc"
        test "$ANSWER" = "simple-ctf-svc"
      hints:
        - "`kubectl get ingress simple-ctf-ingress -n deployment-basics -o yaml`"
        - "`kubectl get svc -n deployment-basics`"

    - id: question-ingress-path
      type: question
      title: URL path for the CTF UI
      description: |
        Once the app is healthy, open it in your browser (Docker must publish **port 80**).
        Submit the **path prefix** where the CTF UI is exposed (starts with `/`).
      answer_type: text
      correct_message: |
        Open **`http://localhost/ctf/`** — Traefik strips the `/ctf` prefix before forwarding to the app.
      verify: |
        test "$ANSWER" = "/ctf"
      hints:
        - "Check the Ingress `spec.rules[].http.paths[].path`"
        - "Use the host from the Ingress rule (`localhost`)"

    - id: question-flag-ready
      type: question
      title: Confirm the CTF app is live
      description: |
        Open **`http://localhost/ctf/`** on your machine (with `-p 80:80` on `docker run`).
        When the UI shows the flag, submit **`done`**.
      answer_type: text
      correct_message: |
        The deployment is healthy and the flag API responds at `/ctf/api/flag`.
      verify: |
        ready=$(kubectl get deploy simple-ctf -n deployment-basics -o jsonpath='{.status.readyReplicas}' 2>/dev/null)
        test "$ready" = "1"
        curl -sf -H 'Host: localhost' http://127.0.0.1/ctf/api/flag | grep -q '"flag"'
        test "$ANSWER" = "done"
      hints:
        - "`curl -s -H 'Host: localhost' http://127.0.0.1/ctf/api/flag`"
        - "Terminal header may show an **Open in browser** tab for `localhost/ctf`"

  markdowns:
    - id: cheat-sheet
      title: Cheat sheet
      icon: description
      content: |
        ## Debugging deployments

        - Workloads: `kubectl get deploy,pods,svc,ingress -n deployment-basics`
        - Events: `kubectl describe deploy simple-ctf -n deployment-basics`
        - Logs: `kubectl logs -n deployment-basics -l app=simple-ctf`
        - Edit resources: `kubectl edit deploy/svc/ingress ... -n deployment-basics`
        - Set image: `kubectl set image deploy/simple-ctf simple-ctf=ghcr.io/exital/simple-ctf:latest -n deployment-basics`

    - id: ctf-app
      title: CTF app
      icon: flag
      content: |
        ## [simple-ctf](https://github.com/Exital/simple-ctf)

        - Image: `ghcr.io/exital/simple-ctf:latest`
        - Listens on port **3000** inside the pod
        - Requires **`FLAG`** (auto-generated by the image entrypoint when the container starts)
        - Flag API: `GET /api/flag` — UI loads it in the browser
        - Optional UI strings use `CTF_*` environment variables (see upstream README)

    - id: lab-info
      title: Lab info
      icon: info
      content: |
        Namespace **`deployment-basics`**. Exposed via **Ingress** at **`http://localhost/ctf/`**.

        Run the k3slab container with **`-p 80:80`** (and `-p 3010:3010` for this UI). Traefik strips the `/ctf` prefix before traffic reaches the app.
