name: Deployment Basics
description: Troubleshoot the simple-ctf Deployment, Service, and Ingress, then capture the flag at /ctf.

cluster:
  disable_traefik: true

tabs:
  steps:
    - id: question-deploy-manifests
      type: question
      title: Deploy the CTF challenge
      description: |
        Your team is putting on a **capture-the-flag** challenge — they need you to get the app into the cluster.

        The manifests are in **`/lab/02-deployment-basics/manifests`**. Use **`kubectl apply`** to apply the whole directory.
      answer_type: observe
      poll_interval_seconds: 5
      setup:
        - run: bash scripts/setup.sh
          background: true
      correct_message: |
        Challenge manifests are deployed. Your default namespace is now **`deployment-basics`** — you can omit **`-n`** in **`kubectl`** commands.

        Oh no — the deployment is broken. We’re going to need your help to recover from this disaster.
      verify: |
        kubectl get ns deployment-basics &>/dev/null
        kubectl config set-context --current --namespace=deployment-basics &>/dev/null
        kubectl get deploy simple-ctf &>/dev/null
        kubectl get svc simple-ctf-svc &>/dev/null
        kubectl get ingress simple-ctf-ingress &>/dev/null
        kubectl get cm simple-ctf-entrypoint &>/dev/null
      solution_script: |
        kubectl apply -f manifests/
        kubectl config set-context --current --namespace=deployment-basics
      hints:
        - "`kubectl apply -f <dir>/` applies every manifest in that directory (e.g. `-f /lab/02-deployment-basics/manifests/` — use the directory path, not `manifests/*`)"
        - "If some objects failed with **namespace not found**, run apply again (namespace is created first via `00-namespace.yml`)"
        - "`kubectl get deploy,svc,ingress`"
        - "Ingress uses class **`nginx`**; ingress-nginx installs in the background — wait for controller pods if ingress checks fail early"

    - id: question-image-tag
      type: question
      title: Fix the container image tag
      description: |
        Quick update from the team: pods are stuck — **`kubectl get pods`** will probably show **ImagePullBackOff**. The manifest uses an image tag that does not exist on the registry.

        Find a tag that actually exists for **`ghcr.io/exital/simple-ctf`** and fix the Deployment image. This step completes automatically once the cluster is pulling a real tag.
      answer_type: observe
      poll_interval_seconds: 5
      correct_message: |
        Yes — you picked a real tag and the image is pulling successfully. The team can breathe again.
      verify: |
        img=$(kubectl get deploy simple-ctf -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null)
        case "$img" in
          ghcr.io/exital/simple-ctf:*) ;;
          *) exit 1 ;;
        esac
        tag="${img#ghcr.io/exital/simple-ctf:}"
        test -n "$tag"
        tags=$(curl -sf \
          -H "Authorization: Bearer $(curl -sf 'https://ghcr.io/token?scope=repository:exital/simple-ctf:pull' | jq -r .token)" \
          https://ghcr.io/v2/exital/simple-ctf/tags/list | jq -r '.tags[]')
        echo "$tags" | grep -qxF "$tag"
      solution_script: |
        token=$(curl -sf 'https://ghcr.io/token?scope=repository:exital/simple-ctf:pull' | jq -r .token)
        tags=$(curl -sf -H "Authorization: Bearer ${token}" https://ghcr.io/v2/exital/simple-ctf/tags/list | jq -r '.tags[]')
        if echo "$tags" | grep -qxF latest; then
          tag=latest
        else
          tag=$(echo "$tags" | head -1)
        fi
        kubectl set image deploy/simple-ctf simple-ctf=ghcr.io/exital/simple-ctf:${tag}
      hints:
        - "`kubectl describe deploy simple-ctf` — look for pull errors on the image"
        - "See which tags are published on the [simple-ctf package page](https://github.com/Exital/simple-ctf/pkgs/container/simple-ctf) on GitHub"
        - "`kubectl set image deploy/simple-ctf simple-ctf=ghcr.io/exital/simple-ctf:<tag>`"

    - id: question-env-value
      type: question
      title: Unexpected pod logs
      description: |
        The image is pulling now, but the CTF pod still will not stay up — the logs do not look right.

        Check the **CTF pod logs**, see what is causing the issue, and fix the Deployment.
      answer_type: observe
      poll_interval_seconds: 5
      correct_message: |
        You did it — the pod is **Running** and the app came up. Whatever was in those logs is fixed; the challenge is alive again.
      verify: |
        val=$(kubectl get deploy simple-ctf -o jsonpath='{.spec.template.spec.containers[0].env[?(@.name=="CTF_RELAY_MODE")].value}' 2>/dev/null)
        test "$val" = "active"
        pod=$(kubectl get pods -l app=simple-ctf -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
        test -n "$pod"
        kubectl get pod "$pod" -o jsonpath='{.status.phase}' | grep -qx Running
        kubectl get pod "$pod" -o jsonpath='{.status.containerStatuses[0].ready}' | grep -qx true
      solution_script: |
        kubectl set env deploy/simple-ctf CTF_RELAY_MODE=active
      hints:
        - "`kubectl logs -l app=simple-ctf --tail=50`"
        - "`kubectl set env deploy/simple-ctf CTF_RELAY_MODE=active`"

    - id: question-service-selector
      type: question
      title: Traffic isn't reaching the app
      description: |
        The pod is healthy, but the team still cannot reach the challenge from inside the cluster.

        Run **`kubectl get svc,endpoints`** — the Service may have **no endpoints** even though the CTF pod is running. Something in the manifest is not wiring traffic to the right pods; fix it so the Service can send traffic to the app.
      answer_type: observe
      poll_interval_seconds: 5
      correct_message: |
        Nice — the Service is pointing at the CTF pods again. Traffic can actually reach the app inside the cluster.
      verify: |
        sel=$(kubectl get svc simple-ctf-svc -o jsonpath='{.spec.selector.app}' 2>/dev/null)
        test "$sel" = "simple-ctf"
        ip=$(kubectl get endpoints simple-ctf-svc -o jsonpath='{.subsets[0].addresses[0].ip}' 2>/dev/null)
        test -n "$ip"
      solution_script: |
        kubectl patch svc simple-ctf-svc --type=json -p '[{"op":"replace","path":"/spec/selector","value":{"app":"simple-ctf"}}]'
      hints:
        - "`kubectl get deploy simple-ctf --show-labels` — compare pod labels to what the Service is looking for"
        - "`kubectl get endpoints simple-ctf-svc`"
        - "`kubectl edit svc simple-ctf-svc`"

    - id: question-ingress-backend
      type: question
      title: Players still can't reach the challenge
      description: |
        In-cluster routing works, but players hitting **`http://localhost/ctf/`** still get errors.

        The **Ingress** is supposed to send **`/ctf`** traffic to the app on port **3000** — path rewrites are already set up. Something in the Ingress spec is still wrong; fix it so external traffic reaches the challenge.
      answer_type: observe
      poll_interval_seconds: 5
      correct_message: |
        The Ingress is wired up — **`http://localhost/ctf/`** should work now. NGINX strips **`/ctf`** on the way in so the app sees paths like **`/api/flag`**, not **`/ctf/api/flag`**.
      verify: |
        svc=$(kubectl get ingress simple-ctf-ingress -o jsonpath='{.spec.rules[0].http.paths[0].backend.service.name}' 2>/dev/null)
        test "$svc" = "simple-ctf-svc"
        port=$(kubectl get ingress simple-ctf-ingress -o jsonpath='{.spec.rules[0].http.paths[0].backend.service.port.number}' 2>/dev/null)
        test "$port" = "3000"
      solution_script: |
        kubectl patch ingress simple-ctf-ingress --type=json \
          -p '[{"op":"replace","path":"/spec/rules/0/http/paths/0/backend/service/name","value":"simple-ctf-svc"}]'
      hints:
        - "`kubectl get ingress simple-ctf-ingress -o yaml`"
        - "`kubectl get svc` — the Ingress backend must match a real Service name"
        - "Path and rewrite annotations are already on the Ingress — check which **Service** it points at"

    - id: question-flag-ready
      type: question
      title: Capture the flag
      description: |
        The challenge is finally online — time to play for real.

        Open **`http://localhost/ctf/`** in your browser, or **`curl`** the flag API at **`/ctf/api/flag`**. Paste the **flag** here (e.g. `CTF{...}`).
      answer_type: text
      correct_message: |
        That's the flag — you recovered the deployment and beat the challenge. Nice work.
      incorrect_message: |
        Not quite — that does not match what the challenge returns. Make sure **`http://localhost/ctf/`** loads (`curl -s -H 'Host: localhost' http://127.0.0.1/ctf/api/flag`) and paste the exact **`flag`** from the JSON.
      verify: |
        ready=$(kubectl get deploy simple-ctf -o jsonpath='{.status.readyReplicas}' 2>/dev/null)
        test "$ready" = "1"
        expected=$(curl -sS --max-time 5 -f -H 'Host: localhost' 'http://127.0.0.1/ctf/api/flag' | jq -r '.flag // empty')
        test -n "$expected"
        test "$ANSWER" = "$expected"
      solution_answer_script: |
        set -e
        kubectl wait --for=condition=available deploy/simple-ctf --timeout=120s >/dev/null 2>&1 || true
        for i in $(seq 1 90); do
          flag=$(curl -sS --max-time 2 -f -H 'Host: localhost' 'http://127.0.0.1/ctf/api/flag' | jq -r '.flag // empty') || true
          if test -n "$flag"; then
            printf '%s\n' "$flag"
            exit 0
          fi
          sleep 1
        done
        exit 1
      hints:
        - "`curl -s -H 'Host: localhost' http://127.0.0.1/ctf/api/flag`"
        - "Terminal header may show an **Open in browser** tab for **`localhost/ctf`**"
        - "Paste the flag string only — not the full JSON response"

  markdowns:
    - id: cheat-sheet
      title: Cheat sheet
      icon: description
      content: |
        ## Debugging deployments

        - Deploy lab: `kubectl apply -f /lab/02-deployment-basics/manifests/`
        - After the first step, **`deployment-basics`** is the default namespace (no **`-n`** needed)
        - Workloads: `kubectl get deploy,pods,svc,ingress`
        - Events: `kubectl describe deploy simple-ctf`
        - Logs: `kubectl logs -l app=simple-ctf`
        - Edit resources: `kubectl edit deploy/svc/ingress ...`
        - Set image: `kubectl set image deploy/simple-ctf simple-ctf=ghcr.io/exital/simple-ctf:<tag>`

    - id: ctf-app
      title: CTF app
      icon: flag
      content: |
        ## [simple-ctf](https://github.com/Exital/simple-ctf)

        - Image: [ghcr.io/exital/simple-ctf](https://github.com/Exital/simple-ctf/pkgs/container/simple-ctf) (pick a valid tag)
        - Listens on port **3000** inside the pod
        - Lab entrypoint requires **`CTF_RELAY_MODE=active`** before starting the app
        - Flag API: `GET /api/flag` — UI loads it in the browser
        - Optional UI strings use `CTF_*` environment variables (see upstream README)

    - id: lab-info
      title: Lab info
      icon: info
      content: |
        Namespace **`deployment-basics`** (default for **`kubectl`** after manifests are applied). Exposed via **Ingress** at **`http://localhost/ctf/`**.

        Run the k3slab container with **`-p 80:80`** (and `-p 3010:3010` for this UI). **ingress-nginx** serves **`/ctf`** on port 80 and rewrites paths so the app sees **`/`** (not `/ctf`).
