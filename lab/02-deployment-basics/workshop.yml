name: Deployment Basics
description: Troubleshoot the simple-ctf Deployment, Service, and Ingress, then capture the flag at /ctf.

cluster:
  disable_traefik: true

tabs:
  steps:
    - id: question-deploy-manifests
      type: question
      title: Deploy the lab manifests
      description: |
        A background setup task is starting now to install **ingress-nginx** for this lab. You can continue with the deployment tasks while it is provisioning.

        Deploy the lab stack from the **`manifests/`** directory in this lab folder using **`kubectl apply`** (you choose flags such as `-f` and the path — the full command is not given here).

        This step completes automatically once the namespace and workloads are present in the cluster.
      answer_type: observe
      poll_interval_seconds: 5
      setup:
        - run: bash scripts/setup.sh
          background: true
      correct_message: |
        Lab manifests are applied in namespace **`deployment-basics`**. Your shell context now uses that namespace by default, so you can omit **`-n deployment-basics`** in **`kubectl`** commands.
      verify: |
        kubectl get ns deployment-basics &>/dev/null
        kubectl config set-context --current --namespace=deployment-basics &>/dev/null
        kubectl get deploy simple-ctf &>/dev/null
        kubectl get svc simple-ctf-svc &>/dev/null
        kubectl get ingress simple-ctf-ingress &>/dev/null
        kubectl get cm simple-ctf-entrypoint &>/dev/null
      hints:
        - "From the lab directory: `kubectl apply -f manifests/` (not `manifests/*` — use the directory path)"
        - "If some objects failed with **namespace not found**, run `kubectl apply -f manifests/` again (namespace is applied first via `00-namespace.yml`)"
        - "`kubectl get deploy,svc,ingress`"
        - "Ingress uses class **`nginx`**; the lab starts ingress-nginx setup in the background, so wait until controller pods are ready if ingress checks fail early"

    - id: question-image-tag
      type: question
      title: Fix the container image tag
      description: |
        The Deployment cannot pull the application image with the broken tag in the manifest.

        Pick a **valid tag** for [simple-ctf on GitHub Container Registry](https://github.com/Exital/simple-ctf/pkgs/container/simple-ctf) (`ghcr.io/exital/simple-ctf`) and update the Deployment image.

        This step completes automatically once the Deployment uses a tag that exists in the registry.
      answer_type: observe
      poll_interval_seconds: 5
      correct_message: |
        The Deployment image uses a valid **`ghcr.io/exital/simple-ctf`** tag.
      verify: |
        img=$(kubectl get deploy simple-ctf -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null)
        case "$img" in
          ghcr.io/exital/simple-ctf:*) ;;
          *) exit 1 ;;
        esac
        tag="${img#ghcr.io/exital/simple-ctf:}"
        test -n "$tag"
        tags=$(curl -sf \
          -H "Authorization: Bearer $(curl -sf 'https://ghcr.io/token?scope=repository:exital/simple-ctf:pull' | jq -r .token)" \
          https://ghcr.io/v2/exital/simple-ctf/tags/list | jq -r '.tags[]')
        echo "$tags" | grep -qxF "$tag"
      hints:
        - "`kubectl describe deploy simple-ctf`"
        - "List published tags: `curl -s -H \"Authorization: Bearer $(curl -sf 'https://ghcr.io/token?scope=repository:exital/simple-ctf:pull' | jq -r .token)\" https://ghcr.io/v2/exital/simple-ctf/tags/list | jq -r '.tags[]'`"
        - "`kubectl set image deploy/simple-ctf simple-ctf=ghcr.io/exital/simple-ctf:<tag>`"

    - id: question-env-value
      type: question
      title: Required value for CTF_RELAY_MODE
      description: |
        After the image pulls, pods may still crash. Read **pod logs** from the lab entrypoint script, then set **`CTF_RELAY_MODE`** on the Deployment to the value the logs require.

        This step completes automatically once the variable is set correctly and the container is **Running** and **ready**.
      answer_type: observe
      poll_interval_seconds: 5
      correct_message: |
        **`CTF_RELAY_MODE=active`** — the app entrypoint can generate a FLAG and start the server.
      verify: |
        val=$(kubectl get deploy simple-ctf -o jsonpath='{.spec.template.spec.containers[0].env[?(@.name=="CTF_RELAY_MODE")].value}' 2>/dev/null)
        test "$val" = "active"
        pod=$(kubectl get pods -l app=simple-ctf -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
        test -n "$pod"
        kubectl get pod "$pod" -o jsonpath='{.status.phase}' | grep -qx Running
        kubectl get pod "$pod" -o jsonpath='{.status.containerStatuses[0].ready}' | grep -qx true
      hints:
        - "`kubectl logs -l app=simple-ctf --tail=50`"
        - "`kubectl set env deploy/simple-ctf CTF_RELAY_MODE=active`"

    - id: question-service-selector
      type: question
      title: Service selector label
      description: |
        The **Service** must route traffic to the Deployment pods. Check `kubectl get svc,endpoints` and fix the selector.

        This step completes automatically once the Service has endpoints backing it.
      answer_type: observe
      poll_interval_seconds: 5
      correct_message: |
        Service selector matches **`app=simple-ctf`** and endpoints are populated.
      verify: |
        sel=$(kubectl get svc simple-ctf-svc -o jsonpath='{.spec.selector.app}' 2>/dev/null)
        test "$sel" = "simple-ctf"
        ip=$(kubectl get endpoints simple-ctf-svc -o jsonpath='{.subsets[0].addresses[0].ip}' 2>/dev/null)
        test -n "$ip"
      hints:
        - "`kubectl get deploy simple-ctf --show-labels`"
        - "`kubectl edit svc simple-ctf-svc`"

    - id: question-ingress-backend
      type: question
      title: Ingress backend service name
      description: |
        The **Ingress** must point at the correct **Service** name on port 3000. The NGINX rewrite annotations (strip **`/ctf`** so the app sees **`/`**, not **`/ctf`**) are already configured.

        Fix the Ingress backend — this step completes automatically when the Ingress spec is correct.
      answer_type: observe
      poll_interval_seconds: 5
      correct_message: |
        Ingress backend is **`simple-ctf-svc`** on port **3000**. The app is exposed at **`http://localhost/ctf/`** (publish **`-p 80:80`** on `docker run`); NGINX rewrites **`/ctf/...`** so the app sees **`/...`** (e.g. `/ctf/api/flag` → `/api/flag`).
      verify: |
        svc=$(kubectl get ingress simple-ctf-ingress -o jsonpath='{.spec.rules[0].http.paths[0].backend.service.name}' 2>/dev/null)
        test "$svc" = "simple-ctf-svc"
        port=$(kubectl get ingress simple-ctf-ingress -o jsonpath='{.spec.rules[0].http.paths[0].backend.service.port.number}' 2>/dev/null)
        test "$port" = "3000"
      hints:
        - "`kubectl get ingress simple-ctf-ingress -o yaml`"
        - "`kubectl get svc`"
        - "Path and rewrite annotations are already set on the Ingress — only the backend **service name** needs fixing"

    - id: question-flag-ready
      type: question
      title: Capture the flag
      description: |
        Open **`http://localhost/ctf/`** on your machine (with **`-p 80:80`** on `docker run`), or use **`curl`** against **`/ctf/api/flag`**.

        Paste the **flag** value here (e.g. `CTF{...}`).
      answer_type: text
      correct_message: |
        Correct — the deployment is healthy and the flag API matches your answer.
      incorrect_message: |
        That flag does not match **`GET /ctf/api/flag`**. Check the app is reachable (`curl -s -H 'Host: localhost' http://127.0.0.1/ctf/api/flag`) and paste the exact **`flag`** field from the JSON.
      verify: |
        ready=$(kubectl get deploy simple-ctf -o jsonpath='{.status.readyReplicas}' 2>/dev/null)
        test "$ready" = "1"
        expected=$(curl -sf -H 'Host: localhost' http://127.0.0.1/ctf/api/flag | jq -r .flag)
        test -n "$expected"
        test "$ANSWER" = "$expected"
      hints:
        - "`curl -s -H 'Host: localhost' http://127.0.0.1/ctf/api/flag`"
        - "Terminal header may show an **Open in browser** tab for `localhost/ctf`"
        - "Submit the flag string only (no JSON wrapper)"

  markdowns:
    - id: cheat-sheet
      title: Cheat sheet
      icon: description
      content: |
        ## Debugging deployments

        - Deploy lab: `kubectl apply -f manifests/` (from the lab directory)
        - After the first step, **`deployment-basics`** is the default namespace (no **`-n`** needed)
        - Workloads: `kubectl get deploy,pods,svc,ingress`
        - Events: `kubectl describe deploy simple-ctf`
        - Logs: `kubectl logs -l app=simple-ctf`
        - Edit resources: `kubectl edit deploy/svc/ingress ...`
        - Set image: `kubectl set image deploy/simple-ctf simple-ctf=ghcr.io/exital/simple-ctf:<tag>`

    - id: ctf-app
      title: CTF app
      icon: flag
      content: |
        ## [simple-ctf](https://github.com/Exital/simple-ctf)

        - Image: [ghcr.io/exital/simple-ctf](https://github.com/Exital/simple-ctf/pkgs/container/simple-ctf) (pick a valid tag)
        - Listens on port **3000** inside the pod
        - Lab entrypoint requires **`CTF_RELAY_MODE=active`** before starting the app
        - Flag API: `GET /api/flag` — UI loads it in the browser
        - Optional UI strings use `CTF_*` environment variables (see upstream README)

    - id: lab-info
      title: Lab info
      icon: info
      content: |
        Namespace **`deployment-basics`** (default for **`kubectl`** after manifests are applied). Exposed via **Ingress** at **`http://localhost/ctf/`**.

        Run the k3slab container with **`-p 80:80`** (and `-p 3010:3010` for this UI). **ingress-nginx** serves **`/ctf`** on port 80 and rewrites paths so the app sees **`/`** (not `/ctf`).
